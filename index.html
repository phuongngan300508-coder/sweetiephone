<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweetie Phone 🎀</title>
  <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --pink-main: #FFC1CC;
            --pink-dark: #FF85A2;
            --glass: rgba(255, 255, 255, 0.7);
        }
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #FFF0F5 0%, #FFDEE9 100%);
            font-family: 'Lexend', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .app-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 2px solid white;
            border-radius: 30px;
            padding: 25px;
            margin-top: 30px;
            width: 85%; max-width: 400px;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.15);
            text-align: center;
        }
        input, button {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 15px; border: none; outline: none;
            box-sizing: border-box;
        }
        input { background: white; color: #555; border: 1px solid #eee; }
        button {
            background: var(--pink-dark); color: white;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        canvas {
            background: white; border: 2px solid var(--pink-main);
            border-radius: 15px; touch-action: none; width: 100%; height: 300px;
        }
        .hidden { display: none; }
        #player-list li {
            background: white; padding: 8px; margin: 5px 0;
            border-radius: 10px; color: var(--pink-dark);
        }
    </style>
</head>
<body>
<!-- Bộ đếm tiến độ nổi ở góc trên bên phải -->
<div id="progress-counter" class="hidden" style="position: fixed; top: 10px; right: 10px; background: var(--pink-dark); color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    0/0
</div>
    
    <!-- MÀN HÌNH 1: ĐĂNG NHẬP -->
    <div id="screen-join" class="app-card">
        <h2 style="color: var(--pink-dark);">🎀 Sweetie Phone 🎀</h2>
        <input type="text" id="input-name" placeholder="Tên của bạn...">
        <input type="text" id="input-room" placeholder="Mã phòng (vd: 123)">
        <button onclick="joinRoom()">Vào phòng ngay ✨</button>
    </div>

    <!-- MÀN HÌNH 2: PHÒNG CHỜ -->
    <div id="screen-lobby" class="app-card hidden">
        <h3 id="lobby-info" style="color: var(--pink-dark);">Phòng Chờ</h3>
        <ul id="player-list" style="list-style:none; padding:0;"></ul>
        <p style="font-size: 0.8rem; color: #888;">Đợi chủ phòng bắt đầu nhé...</p>
        <button id="btn-start" onclick="startGame()">BẮT ĐẦU GAME ❤️</button>
    </div>

    <!-- MÀN HÌNH 3: CHƠI GAME -->
    <div id="screen-game" class="app-card hidden">
        <div id="prompt-area" style="margin-bottom:15px; font-weight:bold; color:#d63384; font-size: 1.2rem;"></div>
        
        <!-- Khu vực Viết -->
        <div id="area-write" class="hidden">
            <input type="text" id="input-phrase" placeholder="Viết gì đó thật hài hước...">
        </div>

        <!-- Khu vực Vẽ -->
        <div id="area-draw" class="hidden">
            <canvas id="drawCanvas" width="300" height="300"></canvas>
            <button onclick="clearCanvas()" style="background:#eee; color:#666; font-size: 0.8rem;">Xóa vẽ lại ↩️</button>
        </div>

        <button onclick="submitTurn()">GỬI ĐI ✨</button>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
<div id="screen-showcase" class="app-card hidden">
    <h2 style="color: var(--pink-dark);">Triển lãm tác phẩm 🎨</h2>
    <div id="showcase-content" style="max-height: 60vh; overflow-y: auto; margin-bottom: 10px;"></div>
    
    <!-- Nút này sẽ được ẩn/hiện dựa trên quyền Host -->
    <button id="btn-restart" class="hidden" onclick="restartGame()">Chơi ván mới 🔄</button>
    <p id="wait-restart-msg" style="font-size: 0.8rem; color: #888;">Đợi chủ phòng bắt đầu ván mới...</p>
</div>
    
    <!-- FIREBASE SDK (Dùng bản CDN để chạy ngay không cần cài đặt) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // CONFIG CỦA BẠN ĐÃ ĐƯỢC GẮN VÀO ĐÂY
        const firebaseConfig = {
            apiKey: "AIzaSyCXRVApjdZo4uooz4E4CU7vvJLPjTwzbXc",
            authDomain: "sweetie-935a5.firebaseapp.com",
            databaseURL: "https://sweetie-935a5-default-rtdb.firebaseio.com",
            projectId: "sweetie-935a5",
            storageBucket: "sweetie-935a5.firebasestorage.app",
            messagingSenderId: "865853451079",
            appId: "1:865853451079:web:6ea3067e351e001bd83a62"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = "player_" + Math.random().toString(36).substr(2, 5);
let currentRoom = "";
let isHost = false;
let playerOrder = [];
let myChainOwnerId = "";
let lastSeenRound = 0; // Thêm dòng này để theo dõi vòng hiện tại
        

        // XỬ LÝ VẼ CANVAS
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        function startPaint(e) { painting = true; draw(e); }
        function endPaint() { painting = false; ctx.beginPath(); }
        function draw(e) {
    if (!painting) return;
    
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#FF85A2';

    const rect = canvas.getBoundingClientRect();
    let x, y;

    if (e.touches) {
        // Tọa độ cho cảm ứng (điện thoại)
        x = e.touches[0].clientX - rect.left;
        y = e.touches[0].clientY - rect.top;
    } else {
        // Tọa độ cho chuột (máy tính)
        x = e.clientX - rect.left;
        y = e.clientY - rect.top;
    }

    // Xử lý tỉ lệ nếu Canvas bị co giãn bằng CSS
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    ctx.lineTo(x * scaleX, y * scaleY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x * scaleX, y * scaleY);
}

        canvas.addEventListener('mousedown', (e) => { painting = true; draw(e); });
canvas.addEventListener('mouseup', endPaint);
canvas.addEventListener('mouseleave', endPaint); // Thêm cái này để khi chuột ra ngoài canvas sẽ ngừng vẽ
canvas.addEventListener('mousemove', draw);

// Giữ nguyên cho điện thoại như bạn yêu cầu
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); painting = true; draw(e); });
canvas.addEventListener('touchend', endPaint);
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        window.clearCanvas = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

        // LOGIC GAME
        window.joinRoom = function() {
            const name = document.getElementById('input-name').value;
            currentRoom = document.getElementById('input-room').value;
            if(!name || !currentRoom) return alert("Bạn quên nhập tên hoặc mã phòng kìa! 🎀");

            // Lưu thông tin người chơi lên Firebase
            set(ref(db, `rooms/${currentRoom}/players/${myId}`), { 
                name: name,
                joinedAt: Date.now()
            }).then(() => {
                checkIfHost();
                listenRoom();
                showScreen('screen-lobby');
            });
        };

        async function checkIfHost() {
            const snapshot = await get(ref(db, `rooms/${currentRoom}/host`));
            if (!snapshot.exists()) {
                await set(ref(db, `rooms/${currentRoom}/host`), myId);
                isHost = true;
                document.getElementById('btn-start').classList.remove('hidden');
            } else {
                isHost = snapshot.val() === myId;
                if (!isHost) document.getElementById('btn-start').classList.add('hidden');
            }
        }

       function listenRoom() {
    onValue(ref(db, `rooms/${currentRoom}`), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        // 1. Cập nhật danh sách người chơi (giữ nguyên)
        const pList = document.getElementById('player-list');
        if (pList) {
            pList.innerHTML = "";
            for(let id in data.players) {
                pList.innerHTML += `<li>🌸 ${data.players[id].name} ${id === myId ? '(Bạn)' : ''}</li>`;
            }
        }

        // 2. Cập nhật bộ đếm tiến độ (Mới)
        const counter = document.getElementById('progress-counter');
        if (data.status === "playing") {
            counter.classList.remove('hidden');
            const total = Object.keys(data.players).length;
            const done = data.submitted && data.submitted[data.currentRound] ? Object.keys(data.submitted[data.currentRound]).length : 0;
            counter.innerText = `✨ ${done}/${total}`;
            
            // Tự động kiểm tra chuyển vòng nếu mình là Host
            if (isHost && done >= total) {
                checkAllSubmitted(data.currentRound);
            }
        } else {
            counter.classList.add('hidden');
        }

        // 3. Logic chuyển vòng (giữ nguyên)
        if (data.status === "waiting") {
            lastSeenRound = 0; 
            document.getElementById('lobby-info').innerText = "Phòng Chờ";
            showScreen('screen-lobby');
            if (isHost) document.getElementById('btn-start').classList.remove('hidden');
        } 
        else if (data.status === "playing") {
            const serverRound = data.currentRound;
            const hasSubmitted = data.submitted && data.submitted[serverRound] && data.submitted[serverRound][myId];

            if (hasSubmitted) {
                document.getElementById('screen-game').classList.add('hidden');
                document.getElementById('lobby-info').innerText = "Đang đợi mọi người... ✨";
                showScreen('screen-lobby'); 
                document.getElementById('btn-start').classList.add('hidden'); 
            } else if (serverRound > lastSeenRound) {
                lastSeenRound = serverRound;
                setupTurn(data);
            }
        } 
        else if (data.status === "showcase") {
            renderShowcase(data);
        }
    });
}

        window.startGame = async function() {
    const snapshot = await get(ref(db, `rooms/${currentRoom}/players`));
    const players = Object.keys(snapshot.val());
    if (players.length < 2) return alert("Cần ít nhất 2 người để chơi!");

    // Xáo trộn thứ tự người chơi để tạo vòng tròn giao bài
    const shuffled = players.sort(() => Math.random() - 0.5);
    
    update(ref(db, `rooms/${currentRoom}`), { 
        status: "playing", 
        currentRound: 1,
        playerOrder: shuffled,
        totalRounds: shuffled.length // Số vòng chơi bằng số người chơi
    });
};

       function setupTurn(data) {
    showScreen('screen-game');
    const { currentRound, playerOrder } = data;
    const myIndex = playerOrder.indexOf(myId);
    const ownerIndex = (myIndex - (currentRound - 1) + playerOrder.length) % playerOrder.length;
    myChainOwnerId = playerOrder[ownerIndex];

    const isOdd = currentRound % 2 !== 0;
    const promptArea = document.getElementById('prompt-area');
    promptArea.innerHTML = ""; // Xóa sạch nội dung cũ trước khi thêm mới

    if (currentRound === 1) {
        showWriteArea("Ghi một câu đố bất kỳ:");
    } else {
        get(ref(db, `rooms/${currentRoom}/chains/${myChainOwnerId}/round_${currentRound - 1}`))
            .then(snap => {
                if (!snap.exists()) return;
                const prevContent = snap.val().content;
                if (isOdd) {
                    showWriteArea("Bạn thấy hình này vẽ gì?");
                    promptArea.innerHTML += `<br><img src="${prevContent}" style="width:100%; border-radius:10px; border:2px solid var(--pink-main);">`;
                } else {
                    showDrawArea(`Vẽ lại câu: "${prevContent}"`);
                }
            });
    }
}

       window.submitTurn = async function() {
    const isWriteMode = !document.getElementById('area-write').classList.contains('hidden');
    let value = isWriteMode ? document.getElementById('input-phrase').value : canvas.toDataURL();
    
    if(!value || value.trim() === "") return alert("Đừng để trống mà! ❤️");

    // Lấy thông tin round hiện tại từ DB
    const roomSnap = await get(ref(db, `rooms/${currentRoom}`));
    const roomData = roomSnap.val();
    const round = roomData.currentRound;

    // Lưu vào chuỗi của người chủ (myChainOwnerId)
    await set(ref(db, `rooms/${currentRoom}/chains/${myChainOwnerId}/round_${round}`), {
        content: value,
        authorName: document.getElementById('input-name').value
    });

    // Đánh dấu tôi đã xong vòng này
    await set(ref(db, `rooms/${currentRoom}/submitted/${round}/${myId}`), true);

    if (isHost) {
        checkAllSubmitted(round);
    }
    
    alert("Đã gửi! Chờ bạn bè tí nhé... ✨");
};

async function checkAllSubmitted(round) {
    // Lấy dữ liệu mới nhất một lần nữa để đảm bảo chính xác
    const roomSnap = await get(ref(db, `rooms/${currentRoom}`));
    const data = roomSnap.val();
    if (!data) return;

    const totalPlayers = Object.keys(data.players).length;
    const submittedCount = data.submitted && data.submitted[round] ? Object.keys(data.submitted[round]).length : 0;

    // Nếu đủ người nộp bài
    if (submittedCount >= totalPlayers) {
        if (round >= data.totalRounds) {
            // Nếu đã hết số vòng chơi (bằng số người chơi) -> Xem kết quả
            update(ref(db, `rooms/${currentRoom}`), { status: "showcase" });
        } else {
            // Nếu chưa hết -> Tăng vòng chơi lên
            update(ref(db, `rooms/${currentRoom}`), { currentRound: round + 1 });
        }
    }
}

        function showScreen(id) {
            document.querySelectorAll('.app-card').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showWriteArea(text) {
    document.getElementById('prompt-area').innerText = text;
    document.getElementById('area-write').classList.remove('hidden');
    document.getElementById('area-draw').classList.add('hidden');
    document.getElementById('input-phrase').value = ""; // Xóa chữ cũ
}

function showDrawArea(text) {
    document.getElementById('prompt-area').innerText = text;
    document.getElementById('area-write').classList.add('hidden');
    document.getElementById('area-draw').classList.remove('hidden');
    clearCanvas(); // Xóa hình cũ
}

        function renderShowcase(data) {
    showScreen('screen-showcase');
    
    // Xử lý hiển thị nút chơi lại dựa trên quyền Host
    const btnRestart = document.getElementById('btn-restart');
    const waitMsg = document.getElementById('wait-restart-msg');
    
    // Nếu chưa có phần tử thông báo chờ trong HTML, bạn có thể bổ sung sau, 
    // ở đây code sẽ kiểm tra an toàn để không gây lỗi script.
    if (isHost) {
        if (btnRestart) btnRestart.classList.remove('hidden');
        if (waitMsg) waitMsg.classList.add('hidden');
    } else {
        if (btnRestart) btnRestart.classList.add('hidden');
        if (waitMsg) waitMsg.classList.remove('hidden');
    }

    const container = document.getElementById('showcase-content');
    container.innerHTML = "";

    for (let ownerId in data.chains) {
        const ownerName = data.players[ownerId]?.name || "Ẩn danh";
        let chainHtml = `<div style="border: 2px solid var(--pink-main); margin: 15px 0; padding: 15px; border-radius: 20px; background: white;">`;
        chainHtml += `<h3 style="color: var(--pink-dark);">Chuỗi của ${ownerName}</h3>`;

        const rounds = data.chains[ownerId];
        // Sắp xếp các vòng chơi theo thứ tự round_1, round_2... để hiển thị đúng tiến trình
        const sortedRounds = Object.keys(rounds).sort((a, b) => {
            return parseInt(a.split('_')[1]) - parseInt(b.split('_')[1]);
        });

        for (let r of sortedRounds) {
            const step = rounds[r];
            if (step.content.startsWith('data:image')) {
                chainHtml += `<div style="margin:10px 0;"><small>${step.authorName} vẽ:</small><br><img src="${step.content}" style="width:100%; border-radius:10px; border:1px solid #eee;"></div>`;
            } else {
                chainHtml += `<div style="margin:10px 0;"><small>${step.authorName} viết:</small><p style="font-weight:bold; color:#d63384;">"${step.content}"</p></div>`;
            }
        }
        chainHtml += `</div>`;
        container.innerHTML += chainHtml;
    }
}

        window.restartGame = function() {
    if (!isHost) return;

    const roomRef = ref(db, `rooms/${currentRoom}`);
    update(roomRef, {
        status: "waiting",        // Đưa về trạng thái chờ
        currentRound: null,       // Xóa vòng chơi hiện tại
        submitted: null,          // Xóa các bài đã nộp
        chains: null,             // Xóa dữ liệu album ván cũ
        playerOrder: null         // Xóa thứ tự chơi cũ
    }).then(() => {
        console.log("Đã reset phòng thành công!");
    });
};
    </script>
</body>
</html>
